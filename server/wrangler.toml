name = "balance-tower-api"
main = "src/index.js"
compatibility_date = "2026-06-01"

# База данных рекордов (D1). database_id подставится после `wrangler d1 create`.
[[d1_databases]]
binding = "DB"
database_name = "balance_tower"
database_id = "4e0d4739-51a9-437e-b89d-c138d72dd972"

# Разрешённый источник запросов (страница игры на GitHub Pages).
[vars]
ALLOWED_ORIGIN = "https://babaika8.github.io"

# Секрет: токен бота. Кладётся отдельно командой:
#   wrangler secret put BOT_TOKEN
